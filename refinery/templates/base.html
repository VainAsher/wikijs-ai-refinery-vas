<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ instance_name }}</title>
  <!-- Apply saved theme before first paint to avoid a flash of the wrong theme. -->
  <script>(function(){try{var t=localStorage.getItem('vas-theme');if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <style>
    /* ---- Theme tokens ---------------------------------------------------- */
    :root{
      --bg:#f5f7fa;--panel:#ffffff;--panel2:#f1f4f8;--inset:#f8fafc;
      --line:#e3e8ef;--line2:#d3dae3;--muted:#647387;--text:#1f2a37;--heading:#0f172a;
      --accent:#2563eb;--accent2:#1d4ed8;--accent-weak:#eaf1ff;--accent-fg:#ffffff;
      --chip-bg:#eef2f7;--chip-fg:#3a475a;
      --ok-bg:#dcfce7;--ok-fg:#166534;--warn-bg:#fef3c7;--warn-fg:#92400e;--danger-bg:#fee2e2;--danger-fg:#991b1b;
      --input-bg:#ffffff;--shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.08);--shadow-lg:0 10px 30px rgba(16,24,40,.12);
      --radius:12px;
    }
    html[data-theme="dark"]{
      --bg:#0b1220;--panel:#151d2b;--panel2:#0e1626;--inset:#111a2b;
      --line:#26334a;--line2:#33415c;--muted:#94a3b8;--text:#e5e9f0;--heading:#f1f5f9;
      --accent:#3b82f6;--accent2:#60a5fa;--accent-weak:#172541;--accent-fg:#ffffff;
      --chip-bg:#1f2b40;--chip-fg:#cbd5e1;
      --ok-bg:#0f3d24;--ok-fg:#86efac;--warn-bg:#4a3210;--warn-fg:#fcd34d;--danger-bg:#4c1d1d;--danger-fg:#fca5a5;
      --input-bg:#0e1626;--shadow:0 1px 2px rgba(0,0,0,.4);--shadow-lg:0 12px 34px rgba(0,0,0,.55);
    }
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
    a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
    h1,h2,h3,h4{color:var(--heading);line-height:1.25}
    /* ---- Header / nav ---------------------------------------------------- */
    header{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);box-shadow:var(--shadow)}
    .nav{display:flex;gap:4px;align-items:center;padding:10px 20px;max-width:1500px;margin:auto;flex-wrap:nowrap;overflow-x:auto}
    .nav .brand{font-weight:700;font-size:16px;color:var(--heading);display:flex;align-items:center;gap:8px;margin-right:10px;white-space:nowrap}
    .nav .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
    .nav a.tab{padding:7px 11px;border-radius:8px;color:var(--muted);font-size:14px;font-weight:500;white-space:nowrap}
    .nav a.tab:hover{background:var(--panel2);color:var(--text);text-decoration:none}
    .nav a.tab.active{background:var(--accent-weak);color:var(--accent2)}
    .nav .spacer{flex:1}
    .themebtn{cursor:pointer;border:1px solid var(--line2);background:var(--panel2);color:var(--text);border-radius:8px;width:36px;height:34px;font-size:15px;display:inline-flex;align-items:center;justify-content:center}
    .themebtn:hover{background:var(--accent-weak)}
    main{padding:24px 20px 64px;max-width:1500px;margin:auto}
    /* ---- Cards / layout -------------------------------------------------- */
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin:14px 0;box-shadow:var(--shadow)}
    .card h2,.card h3{margin-top:0}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
    .two{display:grid;grid-template-columns:minmax(320px,440px) minmax(440px,1fr);gap:16px}
    .three{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .four{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .pagehead{display:flex;gap:16px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;margin-bottom:4px}
    .pagehead h2{margin:0 0 2px}
    /* ---- Stat tiles ------------------------------------------------------ */
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);display:block}
    a.stat:hover{border-color:var(--accent);text-decoration:none;transform:translateY(-1px);transition:.12s}
    .stat .n{font-size:26px;font-weight:700;color:var(--heading);line-height:1}
    .stat .l{font-size:12.5px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.04em}
    /* ---- Pills ----------------------------------------------------------- */
    .pill{display:inline-block;padding:3px 9px;border-radius:999px;background:var(--chip-bg);color:var(--chip-fg);margin:2px 3px 2px 0;font-size:12px;font-weight:500;white-space:nowrap}
    .pill.ok{background:var(--ok-bg);color:var(--ok-fg)}.pill.warn{background:var(--warn-bg);color:var(--warn-fg)}.pill.danger{background:var(--danger-bg);color:var(--danger-fg)}
    .muted{color:var(--muted)}.small{font-size:13px}
    /* ---- Forms ----------------------------------------------------------- */
    input,select,textarea,button{font:inherit;border-radius:8px;border:1px solid var(--line2);background:var(--input-bg);color:var(--text);padding:9px 10px;width:100%}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
    textarea{min-height:200px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:13.5px;line-height:1.5}
    textarea#markdown-editor{min-height:60vh}
    label{display:block;margin:12px 0 5px;color:var(--text);font-size:13px;font-weight:600}
    label.inline{display:inline-flex;align-items:center;gap:8px;font-weight:500;margin:6px 0}
    .hint{font-size:12.5px;color:var(--muted);margin:4px 0 0}
    button,.button{cursor:pointer;background:var(--accent);border:1px solid var(--accent);color:var(--accent-fg);border-radius:8px;padding:9px 14px;display:inline-block;text-align:center;text-decoration:none;font-weight:600;width:auto}
    button:hover,.button:hover{background:var(--accent2);border-color:var(--accent2);text-decoration:none}
    button.secondary,.button.secondary{background:var(--panel2);border-color:var(--line2);color:var(--text)}
    button.secondary:hover,.button.secondary:hover{background:var(--accent-weak);border-color:var(--accent)}
    button.ghost,.button.ghost{background:transparent;border-color:var(--line2);color:var(--text)}
    .btn-block{width:100%}
    .row{display:flex;gap:10px;align-items:end;flex-wrap:wrap}.row>*{flex:1;min-width:140px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.actions form{display:inline}
    /* ---- Tooltips -------------------------------------------------------- */
    .help{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--chip-bg);color:var(--muted);font-size:11px;font-weight:700;cursor:help;margin-left:5px;border:1px solid var(--line2);vertical-align:middle}
    .help:hover,.help:focus{background:var(--accent);color:#fff;outline:none}
    [data-tip]{position:relative}
    [data-tip]:hover::after,[data-tip]:focus-visible::after{content:attr(data-tip);position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 9px);background:var(--heading);color:#fff;border-radius:8px;padding:8px 11px;width:max-content;max-width:260px;font-size:12px;font-weight:400;line-height:1.45;z-index:60;white-space:normal;text-align:left;box-shadow:var(--shadow-lg)}
    [data-tip]:hover::before,[data-tip]:focus-visible::before{content:'';position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 3px);border:6px solid transparent;border-top-color:var(--heading);z-index:60}
    /* ---- Collapsible sections (progressive disclosure) ------------------- */
    details.section{border:1px solid var(--line);border-radius:var(--radius);margin:12px 0;background:var(--panel);box-shadow:var(--shadow);overflow:hidden}
    details.section>summary{cursor:pointer;padding:14px 16px;font-weight:600;color:var(--heading);list-style:none;display:flex;align-items:center;gap:10px;user-select:none}
    details.section>summary::-webkit-details-marker{display:none}
    details.section>summary::before{content:'';width:8px;height:8px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);transform:rotate(-45deg);transition:transform .15s;flex:none;margin-top:-2px}
    details.section[open]>summary::before{transform:rotate(45deg)}
    details.section>summary:hover{background:var(--panel2)}
    details.section>summary .sub{font-weight:400;color:var(--muted);font-size:13px}
    details.section>.body{padding:0 16px 16px}
    .badge-soft{font-size:11px;font-weight:600;color:var(--accent2);background:var(--accent-weak);padding:2px 8px;border-radius:999px;margin-left:auto}
    /* ---- Steps ----------------------------------------------------------- */
    .step{display:flex;gap:12px;align-items:baseline}
    .step .num{flex:none;width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-weight:700;font-size:13px;display:inline-flex;align-items:center;justify-content:center}
    /* ---- Tables ---------------------------------------------------------- */
    .table-wrap{width:100%}
    table{width:100%;border-collapse:collapse}
    th,td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
    th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.03em;font-weight:600}
    tbody tr.clickable{cursor:pointer}tbody tr.clickable:hover{background:var(--panel2)}
    /* ---- Misc ------------------------------------------------------------ */
    pre{white-space:pre-wrap;background:var(--inset);border:1px solid var(--line);padding:12px;border-radius:8px;max-height:280px;overflow:auto;font-size:13px}
    code{background:var(--inset);padding:2px 6px;border-radius:5px;font-size:.92em;border:1px solid var(--line)}
    .stickybar{position:sticky;top:56px;z-index:15;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;display:flex;gap:12px;align-items:center;justify-content:space-between;box-shadow:var(--shadow);flex-wrap:wrap}
    .editor-title{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}.editor-title h2,.editor-title h3{margin:0}
    .preview{min-height:60vh;background:var(--inset);border:1px solid var(--line);border-radius:8px;padding:16px;overflow:auto}
    .preview pre{max-height:none}
    .hidden{display:none}
    .tabbar{display:inline-flex;gap:4px;margin-bottom:10px;background:var(--panel2);padding:4px;border-radius:9px;border:1px solid var(--line)}
    .tabbar button{background:transparent;border:none;color:var(--muted);padding:6px 14px;border-radius:6px}
    .tabbar button.active{background:var(--panel);color:var(--text);box-shadow:var(--shadow)}
    .empty{text-align:center;padding:48px 20px;border:1px dashed var(--line2);border-radius:var(--radius);color:var(--muted)}
    .notice{border-left:4px solid var(--accent);padding:12px 14px;background:var(--accent-weak);border-radius:8px}
    .notice.ok{border-left-color:#16a34a;background:var(--ok-bg);color:var(--ok-fg)}
    .notice.warn{border-left-color:#d97706;background:var(--warn-bg);color:var(--warn-fg)}
    .pagination{display:flex;gap:10px;align-items:center;justify-content:space-between;margin:14px 0;flex-wrap:wrap}
    .pagination a{padding:8px 12px;border:1px solid var(--line2);border-radius:8px;background:var(--panel)}
    hr{border:none;border-top:1px solid var(--line);margin:16px 0}
    /* ---- Background-job progress tray (rendered by the poller, see script) --- */
    #job-tray{position:fixed;right:16px;bottom:16px;z-index:80;display:flex;flex-direction:column;gap:10px;width:330px;max-width:calc(100vw - 32px)}
    .job{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:12px 14px;animation:jobin .2s ease}
    @keyframes jobin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .job .jt{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:9px}
    .job .jlabel{font-weight:600;color:var(--heading);font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .job .jpct{color:var(--muted);font-size:12.5px;font-variant-numeric:tabular-nums;flex:none}
    .job .bar{height:7px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);overflow:hidden}
    .job .bar>i{display:block;height:100%;width:0;background:var(--accent);border-radius:999px;transition:width .3s ease}
    .job.indeterminate .bar>i{width:38%;animation:jind 1.1s ease-in-out infinite}
    @keyframes jind{0%{margin-left:-38%}100%{margin-left:100%}}
    .job .jmsg{color:var(--muted);font-size:12px;margin-top:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .job.done{border-color:#16a34a}.job.done .bar>i{background:#16a34a;width:100%}
    .job.error{border-color:var(--danger-fg)}.job.error .bar>i{background:var(--danger-fg);width:100%}
    .job .jview{display:inline-block;margin-top:9px;font-size:12.5px;font-weight:600}
    /* ---- Responsive ------------------------------------------------------ */
    @media(max-width:1000px){.two,.three,.four{grid-template-columns:1fr}.stickybar{position:static}}
    @media(max-width:760px){
      main{padding:16px 12px 56px}
      .nav{padding:10px 12px}
      /* Stacked-card tables: each row becomes a labelled card. */
      table.responsive thead{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
      table.responsive tr{display:block;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;padding:6px 12px;background:var(--panel)}
      table.responsive td{display:block;border:none;padding:8px 0;border-bottom:1px solid var(--line)}
      table.responsive td:last-child{border-bottom:none}
      table.responsive td::before{content:attr(data-label);display:block;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:600;margin-bottom:3px}
    }
  </style>
</head>
<body>
<header>
  <nav class="nav">
    <span class="brand"><span class="dot"></span>{{ instance_name }}</span>
    <a class="tab" href="/">Docs</a>
    <a class="tab" href="/bulk">Bulk</a>
    <a class="tab" href="/connectors">Connectors</a>
    <a class="tab" href="/context">Context</a>
    <a class="tab" href="/pipelines">Pipelines</a>
    <a class="tab" href="/monitor">Monitor</a>
    <a class="tab" href="/gaps">Gaps</a>
    <a class="tab" href="/history">History</a>
    <a class="tab" href="/config">Config</a>
    <a class="tab" href="/guide">Guide</a>
    <span class="spacer"></span>
    <a class="tab" href="/export">Export</a>
    <button type="button" class="themebtn" id="theme-toggle" title="Toggle light / dark" aria-label="Toggle theme">☾</button>
  </nav>
</header>
<main>{% block content %}{% endblock %}</main>
<script>
  // Active nav highlight
  (function(){ var p=location.pathname; document.querySelectorAll('.nav a.tab').forEach(function(a){ var h=a.getAttribute('href'); if(h===p || (h!=='/' && p.indexOf(h)===0) || (h==='/' && p==='/')) a.classList.add('active'); }); })();
  // Theme toggle
  (function(){ var btn=document.getElementById('theme-toggle'); function sync(){ var d=document.documentElement.getAttribute('data-theme')==='dark'; btn.textContent=d?'☀':'☾'; } sync(); btn.addEventListener('click',function(){ var d=document.documentElement.getAttribute('data-theme')==='dark'; var n=d?'light':'dark'; document.documentElement.setAttribute('data-theme',n); try{localStorage.setItem('vas-theme',n);}catch(e){} sync(); }); })();
  // Row click-through (ignore clicks on interactive children)
  document.addEventListener('click', function(e){ const row=e.target.closest('tr[data-href]'); if(row && !e.target.closest('a,button,input,select,textarea,form,summary')) window.location=row.dataset.href; });
  // Connector field switcher: show only [data-conn] blocks matching the selected connector
  function switchConnector(val){ document.querySelectorAll('[data-conn]').forEach(function(el){ el.classList.toggle('hidden', el.getAttribute('data-conn')!==val); }); }
  // Markdown editor tabs + lightweight preview
  function showTab(name){ document.querySelectorAll('[data-editor-tab]').forEach(el=>el.classList.add('hidden')); document.querySelectorAll('[data-tab-button]').forEach(el=>el.classList.remove('active')); const panel=document.querySelector('[data-editor-tab="'+name+'"]'); if(panel) panel.classList.remove('hidden'); const btn=document.querySelector('[data-tab-button="'+name+'"]'); if(btn) btn.classList.add('active'); if(name==='preview') updatePreview(); }
  function escapeHtml(s){return s.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
  function inlineMd(s){return escapeHtml(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');}
  function updatePreview(){ const source=document.getElementById('markdown-editor'); const out=document.getElementById('markdown-preview'); if(!source||!out) return; const lines=source.value.split('\n'); let html=''; let inList=false; let inCode=false; let code=[]; function closeList(){ if(inList){ html+='</ul>'; inList=false; } } function closeCode(){ if(inCode){ html+='<pre><code>'+escapeHtml(code.join('\n'))+'</code></pre>'; code=[]; inCode=false; } } for(const line of lines){ if(line.trim().startsWith('```')){ if(inCode){ closeCode(); } else { closeList(); inCode=true; code=[]; } continue; } if(inCode){ code.push(line); continue; } if(line.startsWith('# ')){closeList(); html+='<h1>'+inlineMd(line.slice(2))+'</h1>';} else if(line.startsWith('## ')){closeList(); html+='<h2>'+inlineMd(line.slice(3))+'</h2>';} else if(line.startsWith('### ')){closeList(); html+='<h3>'+inlineMd(line.slice(4))+'</h3>';} else if(line.startsWith('- ')){ if(!inList){html+='<ul>'; inList=true;} html+='<li>'+inlineMd(line.slice(2))+'</li>';} else if(line.trim()===''){closeList(); html+='<br>';} else {closeList(); html+='<p>'+inlineMd(line)+'</p>';}} closeCode(); closeList(); out.innerHTML=html; }
  // Background-job progress tray: polls /jobs/active so an import/bulk run stays
  // visible and live-updating across page navigations (server holds the state).
  (function(){
    var tray=null, timer=null, FAST=1200, IDLE=5000;
    function ensureTray(){ if(!tray){ tray=document.createElement('div'); tray.id='job-tray'; document.body.appendChild(tray); } return tray; }
    function dropTray(){ if(tray){ tray.remove(); tray=null; } }
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    function pct(j){ return j.total? Math.min(100, Math.round(j.done*100/j.total)) : null; }
    function render(jobs){
      if(!jobs.length){ dropTray(); return; }
      var t=ensureTray(), seen={};
      jobs.forEach(function(j){
        seen['job-'+j.id]=true;
        var el=document.getElementById('job-'+j.id);
        if(!el){ el=document.createElement('div'); el.id='job-'+j.id; t.appendChild(el); }
        var p=pct(j), indet=(p===null && j.status==='running');
        el.className='job'+(indet?' indeterminate':'')+(j.status==='done'?' done':'')+(j.status==='error'?' error':'');
        var right = j.status==='error' ? 'Failed' : j.status==='done' ? 'Done' : (p===null ? j.done+'…' : p+'%');
        var view = (j.status==='done' && j.href) ? '<a class="jview" href="'+esc(j.href)+'">View results &rarr;</a>' : '';
        el.innerHTML='<div class="jt"><span class="jlabel">'+esc(j.label)+'</span><span class="jpct">'+right+'</span></div>'+
          '<div class="bar"><i style="width:'+(p===null?0:p)+'%"></i></div>'+
          (j.message?'<div class="jmsg">'+esc(j.message)+'</div>':'')+view;
      });
      Array.prototype.slice.call(t.children).forEach(function(el){ if(!seen[el.id]) el.remove(); });
    }
    function schedule(ms){ clearTimeout(timer); timer=setTimeout(poll, ms); }
    function poll(){
      fetch('/jobs/active',{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
        var jobs=(d&&d.jobs)||[]; render(jobs);
        schedule(jobs.some(function(j){return j.status==='running';})?FAST:IDLE);
      }).catch(function(){ schedule(IDLE); });
    }
    schedule(500);
  })();
</script>
</body>
</html>
